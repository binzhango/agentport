version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-dependencies:
        patterns: ["*"]
    ignore:
      # Major upgrades can change archive and cryptography behavior and require
      # an explicit compatibility/security review rather than an automated PR.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    ignore:
      # These refs name Rust channels/toolchains, not action releases.
      - dependency-name: dtolnay/rust-toolchain
