version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    ignore:
      # These refs name Rust channels/toolchains, not action releases.
      - dependency-name: dtolnay/rust-toolchain
